<!doctype html>
<html>
  <head>
    <title>Supervision - Réseau</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="p-4">
    <div class="container">
      <h2>Supervision des Hôtes</h2>
      <table class="table table-striped">
        <thead><tr><th>IP</th><th>OS</th><th>Services</th><th>Status</th></tr></thead>
        <tbody>
          {% for h in hosts %}
          <tr>
            <td>{{ h.ip }}</td>
            <td>{{ h.os }}</td>
            <td>{{ h.services }}</td>
            <td>{{ h.status }}</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
      <button class="btn btn-success" onclick="startMonitor()">Démarrer Monitoring</button>
      <button class="btn btn-secondary" onclick="stopMonitor()">Arrêter</button>
      <a class="btn btn-info" href="{{ url_for('export', fmt='json') }}">Exporter JSON</a>
      <a class="btn btn-info" href="{{ url_for('export', fmt='csv') }}">Exporter CSV</a>
    </div>
    <script>
      function startMonitor(){ fetch('/start_monitoring', {method:'POST'}).then(()=>location.reload())}
      function stopMonitor(){ fetch('/stop_monitoring', {method:'POST'}).then(()=>location.reload())}
    </script>
  </body>
</html>
